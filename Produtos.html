<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produtos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="css/prototipo.css">
    <!-- <link rel="stylesheet" href="produto.js"> -->
</head>
<body>

<div class="container mt-4">

    <div class="row">

        <!-- MENU DE BOTÕES -->
        <div class="col-md-2">

            <div class="painel-botoes">

                <!-- incluir -->
                <button class="btn btn-success btn-sistema" id="btn-incluir">
                    <i class="bi bi-plus-circle"></i>
                    Incluir
                </button>                

                <!-- Gravar -->
                <button class="btn btn-primary btn-sistema d-none" id="btn-gravar">
                    <i class="bi bi-floppy"></i>
                    Gravar
                </button>

                <!-- cancelar -->
                <button class="btn btn-secondary btn-sistema d-none" id="btn-cancelar">
                    <i class="bi bi-x-circle"></i>
                    Cancelar
                </button>
               

                <!-- Localizar -->
                <button class="btn btn-warning btn-sistema" id="btn-localizar">
                    <i class="bi bi-search"></i>
                    Localizar
                </button>

                <!-- imprimir -->
                <button class="btn btn-info btn-sistema" id="btn-imprimir">
                    <i class="bi bi-printer"></i>
                    Imprimir
                </button>

                <!-- retornar -->
                <button class="btn btn-secondary btn-sistema" id="btn-retornar">
                    <i class="bi bi-arrow-counterclockwise"></i>
                    Retornar
                </button>
            </div>

        </div>

        <!-- ÁREA DOS CAMPOS -->
        <div class="col-md-10">

            <div class="painel-cadastro" id="id_cadastro">

                <h3 class="titulo"><i class="bi bi-box-seam"></i> Cadastro de Produtos</h3>

                <!-- Formulário de cadastro -->
                <div class="row">

                    <!-- Código -->
                    <div class="col-md-2 mb-3">
                        <label class="form-label">Código</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-key-fill"></i>
                            </span>
                            <input type="text" class="form-control">
                        </div>
                    </div>    
                    
                    <!-- Nome -->
                    <div class="col-md-10 mb-3">
                        <label class="form-label">Nome</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person-fill"></i>
                            </span>
                            <input type="text" class="form-control">
                        </div>
                    </div>

                    <!-- Preço de compra -->
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Preço de compra</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-cash"></i>
                            </span>
                            <input type="text" class="form-control" placeholder="R$ 0,00" step="">
                        </div>
                    </div>

                    <!-- Preço de venda -->
                    <div class="col-md-3 mb-3">

                        <label class="form-label">Preço de venda</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-cash"></i>
                            </span>
                            <!-- <input type="text" class="form-control" placeholder="R$ 0,00"> -->
                            <input type="text" class="form-control" placeholder="0,00"> 
                        </div>
                    </div>

                    <!-- Cor do produto -->
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Cor do produto</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-palette"></i>
                            </span>
                            <select class="form-control">
                                <option value="#">Escolha uma cor</option>
                                <option value="1">Azul</option>
                                <option value="2">Vermelho</option>
                                <option value="3">Verde</option>
                                <option value="4">amarelo</option>
                                <option value="5">Branco</option>
                                <option value="6">Preto</option>
                                <option value="7">Marrom</option>
                            </select>
                        </div>
                    </div>

                    <!-- Data de Fabricação -->
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Data de Fabricação</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-calendar-fill"></i>
                            </span>
                            <input type="date" class="form-control">
                        </div>
                    </div>                     


                    <!-- descrição do produto -->
                    <div class="col-md-9 mb-3 mt-4">
                        <label class="form-label">Descrição do produto</label>
                        <div class="input-group">
                            <span class="input-group-text">
                            <i class="bi bi-pencil-square"></i>
                            </span>
                            <textarea class="form-control" rows="5" placeholder="Descreva aqui o produto"></textarea>
                        </div>
                        <!-- Fabricante do produto -->
                        <div class="col-md-10 mb-3 mt-2">
                            <label class="form-label">Fabricante do produto</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi-building"></i>
                                </span>
                                <select class="form-control">
                                    <option value="#">Escolha um fabricante </option>
                                    <option value="1">Adidão</option>
                                    <option value="2">Naike</option>
                                    <option value="3">Pulma</option>
                                    <option value="4">Olímpicos</option>
                                    <option value="5">Pontão</option>
                                    <option value="6">Meião</option>
                                    <option value="7">Reboco</option>
                                    <option value="8">Paquetás</option>
                                    <option value="9">Mizduno</option>
                                    <option value="10">Tiadora</option>
                                </select>
                            </div>
                        </div>  
                    </div>  
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Imagem do produto</label>
                        <div class="card">
                            <div class="card-header">Sapatenis</div>
                            <div class="card-body"><img src="img/produto/001.avif" width="100px"></div> 
                            <div class="card-footer text-center">
                                <button class="btn btn-secondary" type="button" >
                                    <i class="bi-box-arrow-in-down"></i>
                                </button>             
                            </div>
                        </div>
                    </div>  
                                   

                </div>
            </div>
            <!-- class="d-none" -->
            <!-- formulário de procura -->
            <div id="id_procura" class="d-none" >
                <h3 class="titulo"><i class="bi bi-box-seam"></i> Procurar Produtos</h3> 
                <!-- Procura -->
                <div class="input-group mb-3">
                    <input type="text" class="form-control" placeholder="Digite um nome de um produto">
                    <button class="btn btn-primary" type="button">
                        <i class="bi bi-search"></i>
                    </button> 
                    <button class="btn btn-secondary" type="button" id="id_retornar">
                        <i class="bi bi-arrow-counterclockwise"></i>
                    </button> 
                </div>
                
                <!-- table -->
                <div class="table-responsive">
                    <table class="table table-striped table-hover table-bordered align-middle">
                        <thead class="table-primary">
                            <tr>
                                <th>Código</th>
                                <th>Nome produto</th>
                                <th>Preço de compra</th>
                                <th>Preço de venda</th>
                                <th>Cor do produto</th>
                                <th>Data de Fabricação</th>
                                <th>Descrição</th>
                                <th>Ação</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr>
                                <td>1</td>
                                <td>Sapatenis</td>
                                <td>R$ 50,88</td>
                                <td>R$ 125,30</td>
                                <td>Azul Claro</td>
                                <td>29/01/2019</td>
                                <td class="text-center"><button class="btn btn-warning btn-sm text-center">...</button></td>
                                <td>
                                    <button class="btn btn-primary btn-sm">Alterar</button>
                                    <button class="btn btn-danger btn-sm">Excluir</button>
                                </td>
                            </tr>

                            <tr>
                                <td>1</td>
                                <td>Sapatenistd</td>
                                <td>R$ 50,88</td>
                                <td>R$ 125,30</td>
                                <td>Azul Claro</td>
                                <td>29/01/2019</td>
                                <td class="text-center"><button class="btn btn-warning btn-sm ">...</button></td>
                                <td>
                                    <button class="btn btn-primary btn-sm">Alterar</button>
                                    <button class="btn btn-danger btn-sm">Excluir</button>
                                </td>
                            </tr>

                        </tbody>
                    </table>
                </div>               
            </div>     

        </div>
    </div>

</div>
<script src="produtos.js"></script>
</body>
</html>
