<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de fabricante</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="css/prototipo.css">
    <!-- <link rel="stylesheet" href="cliente.js"> -->
</head>

<body>

<div class="container mt-4">

    <div class="row">

        <!-- MENU DE BOTÕES -->
        <div class="col-md-2">

            <div class="painel-botoes">

                <!-- incluir -->
                <button class="btn btn-success btn-sistema" id="btn-incluir">
                    <i class="bi bi-plus-circle"></i>
                    Incluir
                </button>                

                <!-- Gravar -->
                <button class="btn btn-primary btn-sistema d-none" id="btn-gravar">
                    <i class="bi bi-floppy"></i>
                    Gravar
                </button>

                <!-- cancelar -->
                <button class="btn btn-secondary btn-sistema d-none" id="btn-cancelar">
                    <i class="bi bi-x-circle"></i>
                    Cancelar
                </button>
               

                <!-- Localizar -->
                <button class="btn btn-warning btn-sistema" id="btn-localizar">
                    <i class="bi bi-search"></i>
                    Localizar
                </button>

                <!-- imprimir -->
                <button class="btn btn-info btn-sistema" id="btn-imprimir">
                    <i class="bi bi-printer"></i>
                    Imprimir
                </button>

                <!-- retornar -->
                <button class="btn btn-secondary btn-sistema" id="btn-retornar">
                    <i class="bi bi-arrow-counterclockwise"></i>
                    Retornar
                </button>
            </div>

        </div>

        <!-- ÁREA DOS CAMPOS -->
        <div class="col-md-10">

            <div class="painel-cadastro" id="id_cadastro">

                <h3 class="titulo"><i class="bi-building"></i> Cadastro de fabricante</h3>

                <div class="row">

                    <!-- Código -->
                    <div class="col-md-2 mb-3">
                        <label class="form-label">Código</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-key-fill"></i>
                            </span>
                            <input type="text" class="form-control">
                        </div>
                    </div>    
                    
                    <!-- Nome -->
                    <div class="col-md-10 mb-3">
                        <label class="form-label">Nome</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person-fill"></i>
                            </span>
                            <input type="text" class="form-control">
                        </div>
                    </div>
                    
                    <!-- CNPJ -->
                    <div class="col-md-7 mb-3">
                        <label class="form-label">CNPJ</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-card-checklist"></i>
                            </span>
                            <input type="text" class="form-control">
                        </div>
                    </div>

                    <!-- Telefone -->
                    <div class="col-md-5 mb-3">
                        <label class="form-label">Telefone</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-telephone-fill"></i>
                            </span>
                            <input type="tel" class="form-control">
                        </div>
                    </div>
                    
                    <!-- CEP -->
                    <div class="col-md-2 mb-3">
                        <label class="form-label">cep</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi-envelope"></i>
                            </span>
                            <input type="text" class="form-control">
                        </div>
                    </div>


                    <!-- Endereço -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Endereço</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-geo-alt-fill"></i>
                            </span>
                            <input type="text" class="form-control">
                        </div>
                    </div>

                    <!-- Número -->
                    <div class="col-md-2 mb-3">
                        <label class="form-label">Número</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-hash"></i>
                            </span>
                            <input type="text" class="form-control">
                        </div>
                    </div>

                    <!-- complemento  -->
                    <div class="col-md-2 mb-3">
                        <label class="form-label">Complemento</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-house-door-fill"></i>
                            </span>
                            <input type="text" class="form-control">
                        </div>
                    </div>
                    
                    <!-- Bairro -->
                    <div class="col-md-5 mb-3">
                        <label class="form-label">Bairro</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-signpost-fill"></i>
                            </span>
                            <input type="text" class="form-control">
                        </div>
                    </div>
                    <!-- Cidade -->
                    <div class="col-md-5 mb-3">
                        <label class="form-label">Cidade</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-building"></i>
                            </span>
                            <input type="text" class="form-control">
                        </div>
                    </div>

                    <!-- UF -->
                    <div class="col-md-2 mb-3">
                        <label class="form-label">UF</label>
                        <select class="form-select">
                            <option value="">Selecione</option>
                            <option value="BA">BA</option>
                            <option value="ES">ES</option>
                            <option value="MG">MG</option>
                            <option value="PR">PR</option>
                            <option value="RJ">RJ</option>
                            <option value="RS">RS</option>
                            <option value="SP">SP</option>
                        </select>
                    </div>                  

                    <!-- email -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">E-mail</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-envelope-fill"></i>
                            </span>
                            <input type="text" class="form-control">
                        </div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label fw-bold">Status</label>

                        <div class="btn-group w-100" role="group">
                            <input type="radio" class="btn-check" name="status" id="ativo" checked>
                            <label class="btn btn-outline-success" for="ativo">
                                <i class="bi bi-check-circle-fill"></i> Ativo
                            </label>

                            <input type="radio" class="btn-check" name="status" id="inativo">
                            <label class="btn btn-outline-danger" for="inativo">
                                <i class="bi bi-x-circle-fill"></i> Inativo
                            </label>
                        </div>
                    </div>

                </div>

            </div>
            <!-- class="d-none" -->
            <!-- formulário de procura -->
            <div id="id_procura" class="d-none" >
                <h3 class="titulo"><i class="bi-building"></i> Procurar Fabricante</h3> 
                <!-- Procura -->
                <div class="input-group mb-3">
                    <input type="text" class="form-control" placeholder="Digite um nome do fabricante">
                    <button class="btn btn-primary" type="button">
                        <i class="bi bi-search"></i>
                    </button> 
                    <button class="btn btn-secondary" type="button" id="id_retornar">
                        <i class="bi bi-arrow-counterclockwise"></i>
                    </button> 
                </div>
                
                <!-- table -->
                <div class="table-responsive">
                    <table class="table table-striped table-hover table-bordered align-middle">
                        <thead class="table-primary">
                            <tr>
                                <th>Código</th>
                                <th>Nome do usuario</th>
                                <th>CNPJ</th>
                                <th>Telefone</th>
                                <th>Email</th>
                                <th>Situação</th>
                                <th>Outros dados</th>
                                <th>Ação</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr>
                                <td>1</td>
                                <td>Clínica Rio</td>
                                <td>34.154.443/0001-59</td>
                                <td>21-2471-4810</td>
                                <td>clinicarioiraja@gmail.com</td>
                                <td>Ativo</td>
                                <td class="text-center"><button class="btn btn-warning btn-sm text-center">...</button></td>
                                <td>
                                    <button class="btn btn-primary btn-sm">Alterar</button>
                                    <button class="btn btn-danger btn-sm">Excluir</button>
                                </td>
                            </tr>

                            <tr>
                                <td>2</td>
                                <td>Casa de saúde Nossa senhora de Fátima</td>
                                <td>26.782.449/0001-57</td>
                                <td>21-2767-7671</td>
                                <td>clínica@gmail.com</td>
                                <td>Ativo</td>
                                <td class="text-center"><button class="btn btn-warning btn-sm ">...</button></td>
                                <td>
                                    <button class="btn btn-primary btn-sm">Alterar</button>
                                    <button class="btn btn-danger btn-sm">Excluir</button>
                                </td>
                            </tr>

                        </tbody>
                    </table>
                </div>               
            </div>     

        </div>

    </div>

</div>
<script src="usuarios.js"></script>

</body>
</html>
