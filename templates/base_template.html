{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuários</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS Personalizado -->    
    
    <link rel="stylesheet" href="{% static 'css/prototipo.css' %}">
    <link rel="stylesheet" href="{% static 'js/clientes.js' %}">
</head>

<body>

<div class="container mt-4">

    <div class="row">

        <!-- MENU DE BOTÕES -->
        <div class="col-md-2">

            <div class="painel-botoes">
              
                <!-- incluir -->
                <button class="btn btn-success btn-sistema" id="btn-incluir">
                    <i class="bi bi-plus-circle"></i>
                    Incluir
                </button>                

                <!-- Gravar -->
                <button class="btn btn-primary btn-sistema d-none" id="btn-gravar">
                    <i class="bi bi-floppy"></i>
                    Gravar
                </button>

                <!-- cancelar -->
                <button class="btn btn-secondary btn-sistema d-none" id="btn-cancelar">
                    <i class="bi bi-x-circle"></i>
                    Cancelar
                </button>
               

                <!-- Localizar -->
                <button class="btn btn-warning btn-sistema" id="btn-localizar">
                    <i class="bi bi-search"></i>
                    Localizar
                </button>

                <!-- imprimir -->
                <button class="btn btn-info btn-sistema" id="btn-imprimir">
                    <i class="bi bi-printer"></i>
                    Imprimir
                </button>

                <!-- retornar -->
                <button class="btn btn-secondary btn-sistema" id="btn-retornar">
                    <i class="bi bi-arrow-counterclockwise"></i>
                    Retornar
                </button>
            </div>

        </div>

       <!-- ÁREA DOS CAMPOS -->
       {% block campos %}
       {% endblock %}

    </div>

</div>
<script src="{% static 'js/clientes.js' %}"></script>

</body>
</html>
