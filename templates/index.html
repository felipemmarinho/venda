{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Clínica Rio</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    <div class="card login-card">

        <div class="login-header">
            <img src="{% static 'img/logo/Logo.png' %}" alt="" width="300px">

            <div class="subtitulo">
                Sistema de Gestão Vendas
            </div>
        </div>

        <div class="login-body">

            <form>

                <div class="mb-3">
                    <label class="form-label">
                        Usuário
                    </label>

                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person-fill"></i>
                        </span>

                        <input
                            type="text"
                            class="form-control"
                            placeholder="Digite seu usuário">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Senha
                    </label>

                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock-fill"></i>
                        </span>

                        <input
                            type="password"
                            class="form-control"
                            placeholder="Digite sua senha">
                    </div>
                </div>

                <div class="d-flex justify-content-between mb-3">

                    <div class="form-check">
                        <input
                            class="form-check-input" type="checkbox" id="lembrar">
                        <label class="form-check-label" for="lembrar">Lembrar-me</label>
                    </div>

                    <a href="#" class="esqueceu">Esqueceu a senha?</a>

                </div>

                <div class="d-grid">
                    <a href="{% url 'principal' %}"  class="btn btn-primary btn-login"><i class="bi bi-box-arrow-in-right"></i> Entrar </a>
                </div>

            </form>

        </div>

    </div>

</body>
</html>
